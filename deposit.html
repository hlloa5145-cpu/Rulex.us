<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - شحن الرصيد</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="dashboard-header">
        <div class="logo-small">ROLEX FINANCE</div>
        <h3>إيداع رصيد جديد</h3>
    </header>

    <section class="deposit-section">
        <div class="network-selector">
            <button onclick="showAddress('trc')" id="btn-trc" class="active">USDT (TRC20)</button>
            <button onclick="showAddress('bep')" id="btn-bep">USDT (BEP20)</button>
        </div>

        <div class="address-box silver-card">
            <p>عنوان المحفظة المخصص للإيداع:</p>
            <div class="copy-area">
                <span id="wallet-address">TA3uvkYmFmWhJ5DePkgWN8y1rVt6sxbpZB</span>
                <button onclick="copyAddress()"><i class="fa-solid fa-copy"></i></button>
            </div>
            <p class="network-name" id="network-label">الشبكة: TRC20</p>
        </div>

        <form id="deposit-form" class="upload-area">
            <h4>إثبات التحويل</h4>
            <input type="number" id="dep-amount" placeholder="المبلغ المودع ($)" required>
            <div class="file-input">
                <label for="proof-file">ارفع صورة وصل التحويل (Screenshot)</label>
                <input type="file" id="proof-file" accept="image/*" required>
            </div>
            <button type="submit" class="btn-primary">إرسال الطلب للمراجعة</button>
        </form>

        <div class="support-notice">
            <p>هل واجهت مشكلة؟ <a href="https://t.me/Btcun1995" target="_blank">تواصل مع الدعم الفني</a></p>
        </div>
    </section>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>الرئيسية</span></a>
        <a href="team.html" class="nav-item"><i class="fa-solid fa-users"></i><span>الفريق</span></a>
        <div class="nav-actions">
            <button class="btn-deposit active">شحن</button>
            <button class="btn-withdraw" onclick="location.href='withdraw.html'">سحب</button>
        </div>
        <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-check"></i><span>المهام</span></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>الملف</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="deposit.js"></script>
</body>
</html>
