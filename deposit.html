<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - إيداع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --silver-bg: #f8fafc; --white: #ffffff; --sky-blue: #0ea5e9; --dark-blue: #1e293b; --silver-border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--silver-bg); color: var(--dark-blue); direction: rtl; padding-bottom: 90px; }
        .header { background: var(--white); padding: 25px; text-align: center; border-bottom: 1px solid var(--silver-border); }
        .header h2 { color: var(--sky-blue); }
        .deposit-card { background: var(--white); margin: 20px; padding: 25px; border-radius: 25px; border: 1px solid var(--silver-border); }
        .wallet-box { background: #f0f9ff; padding: 15px; border-radius: 15px; border: 1px dashed var(--sky-blue); margin: 15px 0; text-align: center; }
        .wallet-box span { font-weight: bold; font-size: 0.9rem; word-break: break-all; color: var(--dark-blue); }
        .copy-btn { background: var(--sky-blue); color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 10px; cursor: pointer; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid var(--silver-border); border-radius: 10px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--sky-blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid var(--silver-border); }
        .nav-item { text-decoration: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; }
        .nav-item.active { color: var(--sky-blue); }
    </style>
</head>
<body>
    <header class="header"><h2>إيداع USDT</h2></header>
    <main>
        <div class="deposit-card">
            <p style="text-align: center; font-size: 0.9rem; color: #64748b;">قم بتحويل المبلغ إلى العنوان التالي (TRC20):</p>
            <div class="wallet-box">
                <span id="addr">TA3uvkYmFmWhJ5DePkgWN8y1rVt6sxbpZB</span><br>
                <button class="copy-btn" onclick="copyAddr()">نسخ العنوان</button>
            </div>
            <form id="deposit-form">
                <div class="input-group">
                    <label>المبلغ المودع ($)</label>
                    <input type="number" id="dep-amount" placeholder="مثلاً: 50" required>
                </div>
                <div class="input-group">
                    <label>إثبات التحويل (صورة)</label>
                    <input type="file" id="dep-image" accept="image/*" required>
                </div>
                <button type="submit" class="btn-submit">إرسال الطلب للمراجعة</button>
            </form>
        </div>
    </main>
    <nav class="bottom-nav">

        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>الملف</span></a>
    </nav>

</body>
