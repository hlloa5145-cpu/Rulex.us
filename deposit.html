<div class="card">
    <h3>شحن رصيد USDT (TRC20)</h3>
    <div style="background:#e0f2fe; padding:15px; border-radius:10px; margin-bottom:15px;">
        <p>عنوان المحفظة للتحويل:</p>
        <b id="wallet-addr">TXXXXXXX_عنوان_محفظتك_هنا</b>
        <button onclick="navigator.clipboard.writeText('TA3uvkYmFmWhJ5DePkgWN8y1rVt6sxbpZB')">نسخ</button>
    </div>
    
    <input type="number" id="amt" placeholder="المبلغ المحول $">
    <p>ارفع صورة إثبات التحويل (Screenshot):</p>
    <input type="file" id="file-proof" accept="image/*">
    
    <button onclick="submitOrder()" style="background:#0ea5e9; color:white; width:100%; padding:15px; border:none; border-radius:10px; margin-top:10px;">تأكيد الإرسال</button>
</div>

<script src="auth.js"></script>
<script>
    async function submitOrder() {
        const amt = document.getElementById('amt').value;
        const file = document.getElementById('file-proof').files[0];
        const { data: { user } } = await _supabase.auth.getUser();

        if(!amt || !file) return alert("اكمل البيانات وارفع الصورة");

        // رفع الصورة للمخزن (Storage)
        const path = `proofs/${user.id}_${Date.now()}.png`;
        await _supabase.storage.from('images').upload(path, file);
        const { data: url } = _supabase.storage.from('images').getPublicUrl(path);

        // تسجيل المعاملة في الجدول
        await _supabase.from('transactions').insert([{
            user_id: user.id, amount: parseFloat(amt), type: 'deposit', 
            status: 'pending', image_url: url.publicUrl 
        }]);

        alert("تم الإرسال، انتظر موافقة الإدارة ✅");
    }
</script>
