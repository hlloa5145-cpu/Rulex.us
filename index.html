<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - ROLEX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #0ea5e9; --dark: #1e293b; }
        body { background: #f8fafc; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: var(--blue); margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--blue); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn:hover { background: #0284c7; }
        .toggle-link { margin-top: 20px; display: block; color: #64748b; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 id="form-title">تسجيل الدخول</h2>
        
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        
        <button class="btn" id="main-btn" onclick="handleAuth()">دخول</button>
        
        <a href="#" class="toggle-link" id="toggle-auth" onclick="toggleMode()">ليس لديك حساب؟ إنشاء حساب جديد</a>
    </div>

    <script src="auth.js"></script>
    <script>
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء حساب جديد";
            document.getElementById('main-btn').innerText = isLoginMode ? "دخول" : "تسجيل";
            document.getElementById('toggle-auth').innerText = isLoginMode ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب بالفعل؟ سجل دخولك";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) return alert("يرجى ملء كافة البيانات");

            if (isLoginMode) {
                // عملية تسجيل الدخول
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) alert("خطأ في الدخول: " + error.message);
                else window.location.href = 'index.html';
            } else {
                // عملية إنشاء حساب جديد
                const { data, error } = await _supabase.auth.signUp({ email, password });
                
                if (error) {
                    alert("خطأ في التسجيل: " + error.message);
                } else if (data.user) {
                    // إنشاء محفظة وصورة ملف شخصي تلقائية للمستخدم الجديد في قاعدة البيانات
                    await _supabase.from('profiles').insert([{ id: data.user.id, is_banned: false }]);
                    await _supabase.from('wallets').insert([{ user_id: data.user.id, balance: 0 }]);
                    
                    alert("تم إنشاء الحساب بنجاح! يمكنك الدخول الآن ✅");
                    toggleMode();
                }
            }
        }
    </script>
</body>
</html>
