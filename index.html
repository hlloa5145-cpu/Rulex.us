<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --silver-light: #f1f5f9;
            --silver-metallic: #e2e8f0;
            --white: #ffffff;
            --sky-blue: #0ea5e9;
            --dark-text: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--silver-light);
            color: var(--dark-text);
            direction: rtl;
            padding-bottom: 90px;
        }

        .dashboard-header {
            background: var(--white);
            padding: 25px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .logo-small {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--sky-blue);
            letter-spacing: 2px;
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .balance-card {
            background: linear-gradient(135deg, var(--sky-blue), #38bdf8);
            color: var(--white);
            padding: 30px 20px;
            border-radius: 25px;
            margin: 20px;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.25);
            text-align: center;
        }

        .balance-card h2 { font-size: 2.8rem; margin: 10px 0; font-weight: 800; }

        .stat-item {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--silver-metallic);
            flex: 1;
            cursor: pointer;
        }

        .plans-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; padding: 0 20px;
        }

        .plan-card {
            background: var(--white);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--silver-metallic);
            text-align: center;
        }

        .plan-card h4 { color: var(--sky-blue); margin-bottom: 5px; }

        .plan-card button {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: var(--sky-blue);
            color: white; border: none;
            border-radius: 8px;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white);
            display: flex; justify-content: space-around;
            padding: 12px; border-top: 1px solid var(--silver-metallic);
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none; color: #94a3b8;
            display: flex; flex-direction: column; align-items: center;
            font-size: 0.75rem;
        }

        .nav-item i { font-size: 1.3rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--sky-blue); }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <div class="logo-small">ROLEX</div>
        <div class="user-info">
            <i class="fa-solid fa-circle-user"></i>
            <span id="user-email">جاري التحميل...</span>
        </div>
    </header>

    <main>
        <div class="balance-card">
            <p>إجمالي الرصيد (USDT)</p>
            <h2 id="main-balance">$0.00</h2>
        </div>

        <div class="plans-grid">
            <div class="plan-card">
                <h4>VIP 1</h4>
                <p>الإيداع: 10$</p>
                <p>الربح: 1.5$</p>
                <button>تفعيل الآن</button>
            </div>
            <div class="plan-card">
                <h4>VIP 2</h4>
                <p>الإيداع: 50$</p>
                <p>الربح: 8$</p>
                <button>تفعيل الآن</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fa-solid fa-house"></i><span>الرئيسية</span></a>
        <a href="team.html" class="nav-item"><i class="fa-solid fa-users"></i><span>الفريق</span></a>
        <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-check"></i><span>المهام</span></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>الملف</span></a>
    </nav>

</body>
</html>
