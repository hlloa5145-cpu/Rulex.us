<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - فريقي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="dashboard-header">
        <div class="logo-small">ROLEX TEAM</div>
        <h3>نظام الإحالة والمكافآت</h3>
    </header>

    <section class="referral-box">
        <div class="card silver-card">
            <h4>كود الإحالة الخاص بك</h4>
            <div class="copy-area">
                <span id="my-ref-code">تحميل...</span>
                <button onclick="copyRef()"><i class="fa-solid fa-copy"></i> نسخ</button>
            </div>
            <p class="bonus-text">شارك الكود واحصل على 7% مكافأة فورية!</p>
        </div>
    </section>

    <section class="team-stats">
        <div class="stat-item">
            <i class="fa-solid fa-users"></i>
            <span id="team-count">0</span>
            <p>إجمالي الفريق</p>
        </div>
        <div class="stat-item">
            <i class="fa-solid fa-money-bill-trend-up"></i>
            <span id="team-bonus">$0.00</span>
            <p>أرباح الفريق (7%)</p>
        </div>
    </section>

    <section class="team-list-section">
        <h3>أعضاء فريقك</h3>
        <div id="team-list" class="list-container">
            <p class="empty-msg">لا يوجد أعضاء في فريقك بعد.</p>
        </div>
    </section>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>الرئيسية</span></a>
        <a href="team.html" class="nav-item active"><i class="fa-solid fa-users"></i><span>الفريق</span></a>
        <div class="nav-actions">
            <button class="btn-deposit" onclick="location.href='deposit.html'">شحن</button>
            <button class="btn-withdraw" onclick="location.href='withdraw.html'">سحب</button>
        </div>
        <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-check"></i><span>المهام</span></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>الملف</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="team.js"></script>
</body>
</html>
