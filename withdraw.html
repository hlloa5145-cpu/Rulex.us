<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - سحب الأرباح</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="dashboard-header">
        <div class="logo-small">ROLEX WITHDRAW</div>
        <h3>طلب سحب الأرباح</h3>
    </header>

    <section class="withdraw-section">
        <div class="balance-card silver-card">
            <p>الرصيد القابل للسحب:</p>
            <h2 id="withdrawable-balance">$0.00</h2>
        </div>

        <div id="kyc-alert" class="alert-box hidden">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <p>يجب توثيق الهوية (KYC) من صفحة الملف الشخصي لتتمكن من السحب.</p>
        </div>

        <form id="withdraw-form" class="withdraw-form">
            <div class="input-group">
                <label>حدد الشبكة</label>
                <select id="withdraw-network">
                    <option value="TRC20">USDT (TRC20)</option>
                    <option value="BEP20">USDT (BEP20)</option>
                </select>
            </div>

            <div class="input-group">
                <label>عنوان محفظتك</label>
                <input type="text" id="user-wallet-addr" placeholder="أدخل عنوان محفظتك هنا" required>
            </div>

            <div class="input-group">
                <label>المبلغ المطلوب ($)</label>
                <input type="number" id="withdraw-amount" placeholder="أدنى حد للسحب 10$" min="10" required>
            </div>

            <button type="submit" id="submit-withdraw" class="btn-primary">تأكيد طلب السحب</button>
        </form>

        <p class="withdraw-note">تتم معالجة طلبات السحب خلال 24 ساعة كحد أقصى.</p>
    </section>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>الرئيسية</span></a>
        <a href="team.html" class="nav-item"><i class="fa-solid fa-users"></i><span>الفريق</span></a>
        <div class="nav-actions">
            <button class="btn-deposit" onclick="location.href='deposit.html'">شحن</button>
            <button class="btn-withdraw active">سحب</button>
        </div>
        <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-check"></i><span>المهام</span></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>الملف</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="withdraw.js"></script>
</body>
</html>
