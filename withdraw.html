<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب الأرباح - ROLEX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn-withdraw { background: #0ea5e9; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>سحب الأرباح</h2>
        <p>الرصيد المتاح للسحب:</p>
        <h3 id="withdrawable" style="color: #10b981;">$0.00</h3>
        
        <input type="number" id="withdraw-amount" placeholder="أدخل المبلغ">
        <input type="text" id="wallet-address" placeholder="عنوان USDT (TRC20)">
        <button class="btn-withdraw" onclick="handleWithdraw()">إرسال طلب السحب</button>
    </div>

    <script src="auth.js"></script>
    <script>
        let availableProfit = 0;

        async function initWithdraw() {
            const { data: { user } } = await _supabase.auth.getUser();
            
            // حساب الأرباح فقط (الرصيد - رأس المال)
            const { data: wallet } = await _supabase.from('wallets').select('balance').eq('user_id', user.id).single();
            const { data: invs } = await _supabase.from('investments').select('invested_amount').eq('user_id', user.id).eq('status', 'active');
            
            const totalInvested = invs.reduce((sum, i) => sum + i.invested_amount, 0);
            availableProfit = wallet.balance - totalInvested;
            
            document.getElementById('withdrawable').innerText = `$${availableProfit.toFixed(2)}`;
        }

        async function handleWithdraw() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const address = document.getElementById('wallet-address').value;
            const { data: { user } } = await _supabase.auth.getUser();

            if (amount > availableProfit) return alert("لا يمكنك سحب رأس المال المستثمر");
            if (!address) return alert("يرجى إدخال عنوان المحفظة");

            // إرسال لجدول transactions
            const { error } = await _supabase.from('transactions').insert([
                { user_id: user.id, amount: amount, type: 'withdraw', status: 'pending', address: address }
            ]);

            if (!error) {
                alert("تم تقديم طلب السحب للمراجعة ✅");
                window.location.href = 'index.html';
            }
        }
        window.onload = initWithdraw;
    </script>
</body>
</html>
