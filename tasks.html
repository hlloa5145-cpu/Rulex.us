<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهام اليومية</title>
    <style>
        body { background: #f8fafc; font-family: sans-serif; text-align: center; padding: 20px; }
        .timer-box { font-size: 2rem; color: #0ea5e9; background: white; padding: 20px; border-radius: 20px; margin: 20px auto; max-width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-claim { padding: 15px 40px; border-radius: 15px; border: none; background: #0ea5e9; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>
    <h2>استلام الأرباح اليومية</h2>
    <div class="timer-box" id="timer">00:00:00</div>
    <button id="claim-btn" class="btn-claim disabled" onclick="claimReward()" disabled>استلام الأرباح</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="auth.js"></script>
    <script>
        async function checkStatus() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: inv } = await _supabase.from('investments').select('*').eq('user_id', user.id).single();
            const { data: task } = await _supabase.from('daily_tasks').select('*').eq('user_id', user.id).single();

            if (!inv || inv.invested_amount <= 0) {
                document.getElementById('timer').innerText = "لا يوجد استثمار";
                return;
            }

            const lastClaim = task ? new Date(task.last_claim) : new Date(0);
            const now = new Date();
            const diff = (now - lastClaim) / (1000 * 60 * 60);

            if (diff >= 24) {
                const btn = document.getElementById('claim-btn');
                btn.classList.remove('disabled');
                btn.disabled = false;
                document.getElementById('timer').innerText = "جاهز الآن!";
            } else {
                startTimer(24 - diff);
            }
        }

        async function claimReward() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: inv } = await _supabase.from('investments').select('invested_amount').eq('user_id', user.id).single();
            const { data: wallet } = await _supabase.from('wallets').select('balance').eq('user_id', user.id).single();

            const dailyProfit = inv.invested_amount * 0.02; // ربح 2%
            
            // تحديث الوقت وإضافة المال
            await _supabase.from('daily_tasks').upsert({ user_id: user.id, last_claim: new Date().toISOString() });
            await _supabase.from('wallets').update({ balance: wallet.balance + dailyProfit }).eq('user_id', user.id);

            alert(`✅ مبروك! استلمت $${dailyProfit}`);
            location.reload();
        }

        function startTimer(hours) {
            let sec = Math.floor(hours * 3600);
            const timer = document.getElementById('timer');
            const intr = setInterval(() => {
                let h = Math.floor(sec / 3600).toString().padStart(2, '0');
                let m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
                let s = (sec % 60).toString().padStart(2, '0');
                timer.innerText = `${h}:${m}:${s}`;
                if (sec <= 0) { clearInterval(intr); location.reload(); }
                sec--;
            }, 1000);
        }
        checkStatus();
    </script>
</body>
</html>
