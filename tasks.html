<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهمة اليومية - ROLEX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #0ea5e9; --bg: #f8fafc; }
        body { background: var(--bg); font-family: sans-serif; text-align: center; padding: 20px; }
        .task-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
        .timer { font-size: 2.5rem; color: var(--blue); font-weight: 900; margin: 20px 0; background: #f0f9ff; padding: 20px; border-radius: 15px; }
        .btn-claim { width: 100%; padding: 18px; background: var(--blue); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="task-card">
        <i class="fa-solid fa-clock-rotate-left" style="font-size: 4rem; color: var(--blue);"></i>
        <h2 style="margin-top:20px;">المهمة اليومية</h2>
        <p style="color: #64748b; font-size: 0.9rem;">اضغط للمطالبة بأرباح VIP المفعلة</p>

        <div class="timer" id="timer">00:00:00</div>

        <button id="claim-btn" class="btn-claim btn-disabled" onclick="claimReward()" disabled>استلام الأرباح</button>
        <p id="msg" style="margin-top:15px; font-size:0.8rem; color: #ef4444;"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="auth.js"></script>
    <script>
        async function checkTaskStatus() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return;

            // 1. فحص هل المستخدم لديه خطة نشطة في جدول investments
            const { data: inv } = await _supabase.from('investments').select('*').eq('user_id', user.id).single();
            
            if (!inv || inv.amount <= 0) {
                document.getElementById('msg').innerText = "❌ يجب تفعيل خطة استثمارية أولاً!";
                return;
            }

            // 2. فحص آخر مرة استلم فيها من جدول daily_tasks
            const { data: task } = await _supabase.from('daily_tasks').select('*').eq('user_id', user.id).single();
            
            const now = new Date();
            const lastClaim = task ? new Date(task.last_claim) : new Date(0);
            const hoursPassed = (now - lastClaim) / (1000 * 60 * 60);

            if (hoursPassed >= 24) {
                const btn = document.getElementById('claim-btn');
                btn.classList.remove('btn-disabled');
                btn.disabled = false;
                document.getElementById('timer').innerText = "جاهز للاستلام";
            } else {
                startCountdown(24 - hoursPassed);
            }
        }

        function startCountdown(hoursLeft) {
            let seconds = Math.floor(hoursLeft * 3600);
            const timerEl = document.getElementById('timer');
            
            const interval = setInterval(() => {
                const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                timerEl.innerText = `${h}:${m}:${s}`;
                if (seconds <= 0) {
                    clearInterval(interval);
                    location.reload();
                }
                seconds--;
            }, 1000);
        }

        async function claimReward() {
            const { data: { user } } = await _supabase.auth.getUser();
            // تحديث وقت المطالبة بجدول daily_tasks
            await _supabase.from('daily_tasks').upsert({ user_id: user.id, last_claim: new Date().toISOString() });
            
            // إضافة الربح للمحفظة (مثلاً 1 دولار يومياً)
            const { data: w } = await _supabase.from('wallets').select('balance').eq('user_id', user.id).single();
            await _supabase.from('wallets').update({ balance: w.balance + 1.00 }).eq('user_id', user.id);
            
            alert("✅ تم استلام أرباح اليوم!");
            location.reload();
        }

        window.onload = checkTaskStatus;
    </script>
</body>
</html>
