<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهام اليومية - ROLEX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: sans-serif; text-align: center; padding: 20px; padding-bottom: 80px; }
        .task-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .task-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-claim { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #0ea5e9; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-claim.disabled { background: #cbd5e1; cursor: not-allowed; }
        .time-tag { font-size: 0.8rem; background: #f1f5f9; padding: 4px 10px; border-radius: 20px; color: #64748b; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .nav a { color: #94a3b8; text-decoration: none; font-size: 0.7rem; text-align: center; }
        .nav a.active { color: #0ea5e9; font-weight: bold; }
    </style>
</head>
<body>
    <h2>مهام اليوم</h2>
    <p id="plan-status">جاري فحص الاستثمار...</p>

    <div id="tasks-list">
        <div class="task-card">
            <div class="task-info">
                <span>المهمة الأولى</span>
                <span class="time-tag">الساعة 01:00</span>
            </div>
            <button id="btn-1" class="btn-claim disabled" onclick="processClaim(1)" disabled>جمع الأرباح</button>
        </div>

        <div class="task-card">
            <div class="task-info">
                <span>المهمة الثانية</span>
                <span class="time-tag">الساعة 04:00</span>
            </div>
            <button id="btn-4" class="btn-claim disabled" onclick="processClaim(4)" disabled>جمع الأرباح</button>
        </div>

        <div class="task-card">
            <div class="task-info">
                <span>المهمة الثالثة</span>
                <span class="time-tag">الساعة 08:00</span>
            </div>
            <button id="btn-8" class="btn-claim disabled" onclick="processClaim(8)" disabled>جمع الأرباح</button>
        </div>
    </div>

    <nav class="nav">
        <a href="index.html"><i class="fa-solid fa-house"></i><br>الرئيسية</a>
        <a href="invest.html"><i class="fa-solid fa-gem"></i><br>استثمار</a>
        <a href="tasks.html" class="active"><i class="fa-solid fa-calendar-check"></i><br>المهام</a>
        <a href="profile.html"><i class="fa-solid fa-user"></i><br>الملف</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="auth.js"></script>
    <script>
        let dailyProfitPerTask = 0;

        async function initTasks() {
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) return window.location.href = 'auth.html';

            // 1. فحص الاستثمار النشط
            const { data: inv } = await _supabase.from('investments')
                .select('*').eq('user_id', user.id).eq('status', 'active').single();

            if(!inv) {
                document.getElementById('plan-status').innerText = "لا يوجد خطة نشطة";
                return;
            }

            // تقسيم الربح اليومي على 3 مهام
            dailyProfitPerTask = (inv.daily_profit || 0) / 3;
            document.getElementById('plan-status').innerText = `خطة ${inv.plan_name} نشطة`;

            // 2. فحص المهام التي تم جمعها اليوم
            const today = new Date().toISOString().split('T')[0];
            const { data: claims } = await _supabase.from('daily_tasks')
                .select('task_id').eq('user_id', user.id).eq('claim_date', today);

            const claimedIds = claims.map(c => c.task_id);
            const currentHour = new Date().getHours();

            // 3. تفعيل الأزرار بناءً على الوقت
            checkAndEnable(1, currentHour, claimedIds, "btn-1");
            checkAndEnable(4, currentHour, claimedIds, "btn-4");
            checkAndEnable(8, currentHour, claimedIds, "btn-8");
        }

        function checkAndEnable(targetHour, currentHour, claimedIds, btnId) {
            const btn = document.getElementById(btnId);
            if (claimedIds.includes(targetHour)) {
                btn.innerText = "تم الجمع بنجاح ✅";
                btn.classList.add('disabled');
            } else if (currentHour >= targetHour) {
                btn.classList.remove('disabled');
                btn.disabled = false;
            }
        }

        async function processClaim(taskId) {
            const { data: { user } } = await _supabase.auth.getUser();
            const today = new Date().toISOString().split('T')[0];

            // إضافة سجل الجمع لمنع التكرار
            await _supabase.from('daily_tasks').insert({
                user_id: user.id,
                task_id: taskId,
                claim_date: today
            });

            // إضافة المال للمحفظة
            const { data: wallet } = await _supabase.from('wallets').select('balance').eq('user_id', user.id).single();
            await _supabase.from('wallets').update({ balance: wallet.balance + dailyProfitPerTask }).eq('user_id', user.id);

            alert(`✅ تم جمع $${dailyProfitPerTask.toFixed(2)}`);
            location.reload();
        }

        window.onload = initTasks;
    </script>
</body>
</html>
