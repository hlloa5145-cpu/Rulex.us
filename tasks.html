<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهام اليوم - ROLEX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #0ea5e9; --bg: #f8fafc; }
        body { background: var(--bg); font-family: sans-serif; margin: 0; padding: 20px; padding-bottom: 80px; text-align: center; }
        .task-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .task-info { text-align: right; }
        .task-time { font-size: 0.8rem; color: #94a3b8; background: #f1f5f9; padding: 5px 10px; border-radius: 10px; }
        .btn-claim { background: #cbd5e1; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: not-allowed; }
        .active-btn { background: var(--blue) !important; cursor: pointer !important; }
        
        #no-plan-area { margin-top: 50px; color: #64748b; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .nav a { color: #94a3b8; text-decoration: none; font-size: 0.7rem; text-align: center; }
        .nav a.active { color: var(--blue); }
    </style>
</head>
<body>

    <h1>مهام اليوم</h1>

    <div id="no-plan-area">
        <i class="fa-solid fa-lock" style="font-size: 3rem; color: #cbd5e1; margin-bottom: 20px;"></i>
        <p>لا يوجد خطة نشطة حالياً، يرجى شراء باقة لتفعيل المهام.</p>
        <button onclick="location.href='invest.html'" style="color: var(--blue); border: none; background: none; font-weight: bold;">انتقل لمتجر الباقات</button>
    </div>

    <div id="tasks-area" style="display: none;">
        <div class="task-card">
            <button class="btn-claim active-btn" onclick="collectProfit(5)">جمع الأرباح</button>
            <div class="task-info">
                <div>المهمة الأولى</div>
                <span class="task-time">الساعة 01:00</span>
            </div>
        </div>
        <div class="task-card">
            <button class="btn-claim active-btn" onclick="collectProfit(5)">جمع الأرباح</button>
            <div class="task-info">
                <div>المهمة الثانية</div>
                <span class="task-time">الساعة 04:00</span>
            </div>
        </div>
    </div>

    <nav class="nav">
        <a href="index.html"><i class="fa-solid fa-house"></i><br>الرئيسية</a>
        <a href="invest.html"><i class="fa-solid fa-gem"></i><br>استثمار</a>
        <a href="tasks.html" class="active"><i class="fa-solid fa-calendar-check"></i><br>المهام</a>
        <a href="profile.html"><i class="fa-solid fa-user"></i><br>الملف</a>
    </nav>

    <script src="auth.js"></script>
    <script>
        let userWalletId = null;

        async function initTasks() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return window.location.href = 'login.html';

            // 1. فحص هل العميل لديه استثمار نشط؟
            const { data: activePlan } = await _supabase.from('investments')
                .select('*').eq('user_id', user.id).eq('status', 'active').limit(1);

            if (activePlan && activePlan.length > 0) {
                document.getElementById('no-plan-area').style.display = 'none';
                document.getElementById('tasks-area').style.display = 'block';
                
                // حفظ بيانات المحفظة لاستخدامها في الجمع
                const { data: wallet } = await _supabase.from('wallets').select('*').eq('user_id', user.id).single();
                userWalletId = wallet.id;
                walletBalance = wallet.balance;
            } else {
                document.getElementById('no-plan-area').style.display = 'block';
                document.getElementById('tasks-area').style.display = 'none';
            }
        }

        // دالة جمع الأرباح وزيادة الرصيد في قاعدة البيانات
        async function collectProfit(profitAmount) {
            if (!userWalletId) return;

            const { data: currentWallet } = await _supabase.from('wallets').select('balance').eq('id', userWalletId).single();
            const newBalance = currentWallet.balance + profitAmount;

            const { error } = await _supabase.from('wallets')
                .update({ balance: newBalance })
                .eq('id', userWalletId);

            if (!error) {
                alert(`مبروك! تم إضافة $${profitAmount} إلى رصيدك ✅`);
                // هنا يفضل تعطيل الزر حتى اليوم التالي
                event.target.disabled = true;
                event.target.innerText = "تم الجمع";
                event.target.classList.remove('active-btn');
            }
        }

        window.onload = initTasks;
    </script>
</body>
</html>
