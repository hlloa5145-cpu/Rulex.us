<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - الاستثمار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #0ea5e9; --bg: #f8fafc; }
        body { background: var(--bg); font-family: sans-serif; padding: 20px; padding-bottom: 80px; }
        .plan-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; text-align: center; }
        .price { font-size: 1.5rem; color: var(--blue); font-weight: bold; }
        .btn-buy { background: var(--blue); color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">خطط الاستثمار VIP</h2>

    <div class="plan-card">
        <h3>VIP 1</h3>
        <p class="price">$200.00</p>
        <p>الربح اليومي: $4.00 (2%)</p>
        <button class="btn-buy" onclick="activatePlan(200)">تفعيل الخطة الآن</button>
    </div>

    <div class="plan-card">
        <h3>VIP 2</h3>
        <p class="price">$500.00</p>
        <p>الربح اليومي: $10.00 (2%)</p>
        <button class="btn-buy" onclick="activatePlan(500)">تفعيل الخطة الآن</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="auth.js"></script>
    <script>
        async function activatePlan(price) {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: wallet } = await _supabase.from('wallets').select('balance').eq('user_id', user.id).single();

            if (wallet.balance < price) return alert("❌ رصيدك غير كافٍ! اشحن محفظتك أولاً.");

            if (confirm(`هل تريد خصم $${price} لتفعيل الخطة؟`)) {
                // 1. خصم من المحفظة
                await _supabase.from('wallets').update({ balance: wallet.balance - price }).eq('user_id', user.id);
                // 2. تحديث الاستثمار
                await _supabase.from('investments').upsert({
                    user_id: user.id,
                    invested_amount: price,
                    status: 'active',
                    created_at: new Date().toISOString()
                });
                alert("✅ تم تفعيل الخطة! ابدأ بجني الأرباح من صفحة المهام.");
                location.reload();
            }
        }
    </script>
</body>
</html>
