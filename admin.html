<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ROLEX Admin</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; display: inline-block; border: 1px solid #334155; }
        input { display: block; width: 300px; padding: 15px; margin: 10px auto; border-radius: 10px; border: none; }
        .btn { padding: 15px 30px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; width: 100%; }
        .add { background: #22c55e; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h2>إضافة رصيد للمستخدم</h2>
        <input type="text" id="uid" placeholder="أدخل الرقم الطويل (UID)">
        <input type="number" id="amount" placeholder="المبلغ ($)">
        <button class="btn add" onclick="addMoney()">إضافة الرصيد الآن</button>
        <p id="status"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const supabaseUrl = 'https://tlfwdjpmkgngigwaslqe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsZndkanBta2duZ2lnd2FzbHFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTYyODUsImV4cCI6MjA5MDk5MjI4NX0.pRnfH1eK-4CF3D7KMCWJaBaqvCesURQXMOt9J0rKcoU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function addMoney() {
            const uid = document.getElementById('uid').value;
            const amt = parseFloat(document.getElementById('amount').value);
            
            // جلب الرصيد الحالي
            const { data: wallet } = await _supabase.from('wallets').select('balance').eq('user_id', uid).single();
            
            if (wallet) {
                const newBal = wallet.balance + amt;
                await _supabase.from('wallets').update({ balance: newBal }).eq('user_id', uid);
                document.getElementById('status').innerText = "✅ تم إضافة الرصيد بنجاح!";
            } else {
                document.getElementById('status').innerText = "❌ الرقم الطويل غير صحيح";
            }
        }
    </script>
</body>
</html>
