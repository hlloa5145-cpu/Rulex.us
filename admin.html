<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ROLEX الكاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #0ea5e9; --success: #10b981; --danger: #ef4444; }
        body { font-family: sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { padding: 25px; border-radius: 15px; text-align: center; color: white; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #edf2f7; text-align: center; font-size: 0.9rem; }
        th { background: #f1f5f9; color: var(--primary); }
        
        .btn { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; font-size: 0.8rem; }
        .btn-plus { background: var(--accent); } 
        .btn-ban { background: var(--danger); }
        .btn-unban { background: var(--success); }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: right;"><i class="fa-solid fa-user-gear"></i> لوحة التحكم الإدارية</h2>

    <div class="stats-grid">
        <div class="stat-card" style="background: #1e293b;">
            <div style="font-size: 2rem;" id="total-users">0</div>
            <div>إجمالي المستخدمين</div>
        </div>
        <div class="stat-card" style="background: #0ea5e9;">
            <div style="font-size: 2rem;" id="active-invests">0</div>
            <div>استثمارات نشطة</div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-bell"></i> طلبات معلقة (شحن / سحب / هوية)</h3>
        <table>
            <thead>
                <tr>
                    <th>المستخدم</th>
                    <th>النوع</th>
                    <th>المبلغ / التفاصيل</th>
                    <th>الإثبات</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="requests-list"></tbody>
        </table>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-users"></i> إدارة المستخدمين والاستثمارات</h3>
        <table>
            <thead>
                <tr>
                    <th>UID</th>
                    <th>الاستثمار الحالي</th>
                    <th>الرصيد</th>
                    <th>الحالة</th>
                    <th>التحكم بالرصيد والحظر</th>
                </tr>
            </thead>
            <tbody id="users-list"></tbody>
        </table>
    </div>
</div>

<script src="auth.js"></script>
<script>
    async function initAdmin() {
        // 1. جلب البيانات من الجداول
        const { data: users } = await _supabase.from('profiles').select('*');
        const { data: wallets } = await _supabase.from('wallets').select('*');
        const { data: investments } = await _supabase.from('investments').select('*').eq('status', 'active');
        const { data: pendingTrans } = await _supabase.from('transactions').select('*').eq('status', 'pending');

        // تحديث أرقام الإحصائيات
        document.getElementById('total-users').innerText = users.length;
        document.getElementById('active-invests').innerText = investments.length;

        // ملء جدول الطلبات (شحن/سحب/هوية)
        const reqList = document.getElementById('requests-list');
        reqList.innerHTML = pendingTrans.map(t => `
            <tr>
                <td>${t.user_id.substring(0,8)}</td>
                <td><span class="badge" style="background:#e0f2fe; color:#0369a1;">${t.type === 'deposit' ? 'شحن' : t.type === 'withdraw' ? 'سحب' : 'هوية'}</span></td>
                <td>${t.amount ? '$'+t.amount : 'طلب توثيق'}</td>
                <td>${t.image_url ? `<button class="btn btn-plus" onclick="window.open('${t.image_url}')">عرض</button>` : 'لا يوجد'}</td>
                <td>
                    <button class="btn" style="background:var(--success)" onclick="approveRequest('${t.id}', '${t.user_id}', ${t.amount}, '${t.type}')">موافقة</button>
                    <button class="btn" style="background:var(--danger)" onclick="rejectRequest('${t.id}')">رفض</button>
                </td>
            </tr>
        `).join('');

        // ملء جدول إدارة المستخدمين (إضافة/خصم وحظر)
        const userList = document.getElementById('users-list');
        userList.innerHTML = users.map(u => {
            const w = wallets.find(wal => wal.user_id === u.id);
            const inv = investments.find(i => i.user_id === u.id);
            return `
            <tr>
                <td>${u.id.substring(0,8)}</td>
                <td style="color:var(--accent); font-weight:bold;">${inv ? inv.plan_name : 'لا يوجد'}</td>
                <td style="font-weight:bold;">$${w ? w.balance.toFixed(2) : '0.00'}</td>
                <td>${u.is_banned ? '<span class="badge" style="background:#fee2e2; color:#991b1b;">محظور</span>' : 'نشط'}</td>
                <td>
                    <button class="btn btn-plus" onclick="manualAdjust('${u.id}', 'add')">إضافة</button>
                    <button class="btn" style="background:#64748b" onclick="manualAdjust('${u.id}', 'sub')">خصم</button>
                    <button class="btn ${u.is_banned ? 'btn-unban' : 'btn-ban'}" onclick="toggleBan('${u.id}', ${u.is_banned})">
                        ${u.is_banned ? 'فك حظر' : 'حظر'}
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    // دالة الموافقة على الطلبات (تلقائياً تزيد الرصيد في الشحن)
    async function approveRequest(tid, uid, amt, type) {
        if(!confirm("تأكيد الموافقة؟")) return;
        await _supabase.from('transactions').update({ status: 'approved' }).eq('id', tid);
        if (type === 'deposit') {
            const { data: w } = await _supabase.from('wallets').select('balance').eq('user_id', uid).single();
            await _supabase.from('wallets').update({ balance: w.balance + amt }).eq('user_id', uid);
        }
        alert("تمت الموافقة وتحديث الرصيد ✅"); location.reload();
    }

    // دالة الإضافة والخصم اليدوي
    async function manualAdjust(uid, action) {
        let amt = parseFloat(prompt(action === 'add' ? "أدخل مبلغ الإضافة:" : "أدخل مبلغ الخصم:"));
        if (isNaN(amt)) return;
        if (action === 'sub') amt = -amt;

        const { data: w } = await _supabase.from('wallets').select('balance').eq('user_id', uid).single();
        await _supabase.from('wallets').update({ balance: w.balance + amt }).eq('user_id', uid);
        alert("تم تحديث الرصيد يدوياً ✅"); location.reload();
    }

    // دالة الحظر وفك الحظر
    async function toggleBan(uid, status) {
        if(!confirm(status ? "فك حظر المستخدم؟" : "هل تريد حظر هذا المستخدم؟")) return;
        await _supabase.from('profiles').update({ is_banned: !status }).eq('id', uid);
        location.reload();
    }

    window.onload = initAdmin;
</script>
</body>
</html>
