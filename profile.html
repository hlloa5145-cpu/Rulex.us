<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - ملفي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --silver-light: #f8fafc; --white: #ffffff; --sky-blue: #0ea5e9; --dark-text: #1e293b; --silver-metallic: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--silver-light); color: var(--dark-text); direction: rtl; padding-bottom: 100px; }
        .profile-header { background: linear-gradient(135deg, var(--sky-blue), var(--dark-text)); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .user-avatar { font-size: 4rem; margin-bottom: 10px; }
        .menu-container { margin: 20px; }
        .menu-item { background: var(--white); padding: 18px; border-radius: 15px; border: 1px solid var(--silver-metallic); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: var(--dark-text); font-weight: 500; }
        .menu-item i { color: var(--sky-blue); font-size: 1.2rem; }
        .logout-btn { background: #fff1f2; color: #ef4444; border: 1px solid #fecdd3; }
        .logout-btn i { color: #ef4444; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid var(--silver-metallic); }
        .nav-item { text-decoration: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; }
        .nav-item.active { color: var(--sky-blue); }
    </style>
</head>
<body>
    <div class="profile-header">
        <div class="user-avatar"><i class="fa-solid fa-circle-user"></i></div>
        <h3 id="user-display">مستخدم روليكس</h3>
        <p>الحساب: <span style="color: #38bdf8;">موثق ✅</span></p>
    </div>
    <div class="menu-container">
        <a href="withdraw.html" class="menu-item"><span><i class="fa-solid fa-wallet"></i> إدارة السحب</span> <i class="fa-solid fa-chevron-left"></i></a>
        <a href="https://t.me/Btcun1995" class="menu-item"><span><i class="fa-solid fa-headset"></i> الدعم الفني</span> <i class="fa-solid fa-chevron-left"></i></a>
        <a href="#" class="menu-item"><span><i class="fa-solid fa-shield-halved"></i> الأمان</span> <i class="fa-solid fa-chevron-left"></i></a>
        <button onclick="logout()" class="menu-item logout-btn" style="width: 100%; cursor: pointer;"><span><i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج</span></button>
    </div>
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>الرئيسية</span></a>
        <a href="team.html" class="nav-item"><i class="fa-solid fa-users"></i><span>الفريق</span></a>
        <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-check"></i><span>المهام</span></a>
        <a href="profile.html" class="nav-item active"><i class="fa-solid fa-user"></i><span>الملف</span></a>
    </nav>
    <script>
        function logout() { window.location.href = 'auth.html'; }
    </script>
</body>
</html>
