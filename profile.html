<div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
    <h4>إدارة الاستثمار</h4>
    <p id="inv-status" style="font-size: 0.9rem; color: #64748b;">جاري التحميل...</p>
    <button onclick="withdrawInvest()" style="background: #fee2e2; color: #ef4444; border: 1px solid #fca5a5; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer;">سحب رأس المال (غرامة 20%)</button>
</div>

<script>
    async function loadInvestInfo() {
        const { data: { user } } = await _supabase.auth.getUser();
        const { data: inv } = await _supabase.from('investments').select('invested_amount').eq('user_id', user.id).single();
        if (inv && inv.invested_amount > 0) {
            document.getElementById('inv-status').innerText = `المبلغ المستثمر حالياً: $${inv.invested_amount}`;
        } else {
            document.getElementById('inv-status').innerText = "لا يوجد استثمار نشط";
        }
    }

    async function withdrawInvest() {
        const { data: { user } } = await _supabase.auth.getUser();
        const { data: inv } = await _supabase.from('investments').select('*').eq('user_id', user.id).single();
        
        if (!inv || inv.invested_amount <= 0) return alert("لا يوجد استثمار لسحبه!");

        const penalty = inv.invested_amount * 0.20;
        const net = inv.invested_amount - penalty;

        if (confirm(`⚠️ سيتم خصم $${penalty} كغرامة. سيصلك $${net} لمحفظتك. هل أنت متأكد؟`)) {
            const { data: wallet } = await _supabase.from('wallets').select('balance').eq('user_id', user.id).single();
            // 1. إعادة المال المخصوم للمحفظة
            await _supabase.from('wallets').update({ balance: wallet.balance + net }).eq('user_id', user.id);
            // 2. تصفير الاستثمار
            await _supabase.from('investments').update({ invested_amount: 0, status: 'closed' }).eq('user_id', user.id);
            
            alert("✅ تم سحب رأس المال بنجاح.");
            location.reload();
        }
    }
    loadInvestInfo();
</script>
